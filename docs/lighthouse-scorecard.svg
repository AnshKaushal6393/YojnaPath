<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">YojnaPath Lighthouse Scorecard</title>
  <desc id="desc">Lighthouse scores for YojnaPath: Performance 97, Accessibility 96, Best Practices 100, SEO 100.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#031b16" />
      <stop offset="100%" stop-color="#0b2d24" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.28" />
    </filter>
    <style>
      .title { font: 700 34px 'Segoe UI', Inter, Arial, sans-serif; fill: #ecfdf5; }
      .subtitle { font: 500 18px 'Segoe UI', Inter, Arial, sans-serif; fill: #b7d6cc; }
      .label { font: 600 24px 'Segoe UI', Inter, Arial, sans-serif; fill: #ecfdf5; }
      .score { font: 700 40px 'Segoe UI', Inter, Arial, sans-serif; fill: #22c55e; }
      .metric { font: 600 18px 'Segoe UI', Inter, Arial, sans-serif; fill: #d7efe6; }
      .metricValue { font: 700 20px 'Segoe UI', Inter, Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <rect x="36" y="32" width="1128" height="356" rx="24" fill="#102a24" stroke="#1d4d40" />
  </g>

  <text x="68" y="88" class="title">YojnaPath Lighthouse Snapshot</text>
  <text x="68" y="120" class="subtitle">Production audit for https://yojna-path.vercel.app/</text>

  <g transform="translate(95 196)">
    <circle r="62" fill="#12352c" stroke="#22c55e" stroke-width="10" />
    <text x="0" y="14" text-anchor="middle" class="score">97</text>
    <text x="0" y="102" text-anchor="middle" class="label">Performance</text>
  </g>

  <g transform="translate(360 196)">
    <circle r="62" fill="#12352c" stroke="#22c55e" stroke-width="10" />
    <text x="0" y="14" text-anchor="middle" class="score">96</text>
    <text x="0" y="102" text-anchor="middle" class="label">Accessibility</text>
  </g>

  <g transform="translate(650 196)">
    <circle r="62" fill="#12352c" stroke="#22c55e" stroke-width="10" />
    <text x="0" y="14" text-anchor="middle" class="score">100</text>
    <text x="0" y="102" text-anchor="middle" class="label">Best Practices</text>
  </g>

  <g transform="translate(940 196)">
    <circle r="62" fill="#12352c" stroke="#22c55e" stroke-width="10" />
    <text x="0" y="14" text-anchor="middle" class="score">100</text>
    <text x="0" y="102" text-anchor="middle" class="label">SEO</text>
  </g>

  <g transform="translate(68 316)">
    <text x="0" y="0" class="metric">FCP: <tspan class="metricValue">0.4s</tspan></text>
    <text x="180" y="0" class="metric">LCP: <tspan class="metricValue">0.4s</tspan></text>
    <text x="360" y="0" class="metric">TBT: <tspan class="metricValue">0ms</tspan></text>
    <text x="530" y="0" class="metric">CLS: <tspan class="metricValue">0.086</tspan></text>
    <text x="730" y="0" class="metric">Speed Index: <tspan class="metricValue">1.4s</tspan></text>
  </g>
</svg>
