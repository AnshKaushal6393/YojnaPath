<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">YojnaPath App UI Preview</title>
  <desc id="desc">A showcase graphic representing YojnaPath mobile app screens for home, results, and profile flows.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d9e75"/>
      <stop offset="100%" stop-color="#36b48f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 42px 'Segoe UI', Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px 'Segoe UI', Inter, Arial, sans-serif; fill: #335a51; }
      .screenTitle { font: 700 18px 'Segoe UI', Inter, Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 13px 'Segoe UI', Inter, Arial, sans-serif; fill: #527268; }
      .small { font: 700 11px 'Segoe UI', Inter, Arial, sans-serif; fill: #ffffff; }
      .metric { font: 700 22px 'Segoe UI', Inter, Arial, sans-serif; fill: #ffffff; }
      .nav { font: 600 11px 'Segoe UI', Inter, Arial, sans-serif; fill: #355f55; }
    </style>
  </defs>

  <rect width="1400" height="860" rx="32" fill="url(#bg)"/>
  <text x="72" y="86" class="title">YojnaPath UI Showcase</text>
  <text x="72" y="120" class="subtitle">Mobile-first bilingual flows for discovery, matching, and profile management</text>

  <g filter="url(#shadow)">
    <rect x="92" y="180" width="340" height="610" rx="38" fill="#0f172a"/>
    <rect x="106" y="194" width="312" height="582" rx="28" fill="#f8fafc"/>
    <rect x="206" y="204" width="112" height="20" rx="10" fill="#d1d5db"/>

    <rect x="126" y="242" width="272" height="180" rx="28" fill="url(#hero)"/>
    <rect x="144" y="262" width="56" height="56" rx="16" fill="#ffffff"/>
    <path d="M160 273h10l8 13 8-13h9l-13 21v13h-10v-13z" fill="#16a34a"/>
    <text x="144" y="350" class="small">SCHEMES FOR YOU</text>
    <text x="144" y="384" font-family="Segoe UI, Inter, Arial" font-size="28" font-weight="700" fill="#ffffff">Find your</text>
    <text x="144" y="416" font-family="Segoe UI, Inter, Arial" font-size="28" font-weight="700" fill="#ffffff">schemes</text>

    <rect x="144" y="446" width="74" height="82" rx="18" fill="rgba(255,255,255,0.18)"/>
    <rect x="225" y="446" width="74" height="82" rx="18" fill="rgba(255,255,255,0.18)"/>
    <rect x="306" y="446" width="74" height="82" rx="18" fill="rgba(255,255,255,0.18)"/>
    <text x="165" y="485" class="metric">1740</text>
    <text x="170" y="505" class="small">Schemes</text>
    <text x="250" y="485" class="metric">9</text>
    <text x="236" y="505" class="small">User types</text>
    <text x="327" y="485" class="metric">2G</text>
    <text x="321" y="505" class="small">Ready</text>

    <rect x="126" y="554" width="272" height="96" rx="24" fill="#ffffff"/>
    <text x="146" y="586" class="screenTitle">Manage profile</text>
    <text x="146" y="610" class="body">Update your family members, photo, and saved details for better matching.</text>

    <rect x="126" y="664" width="272" height="76" rx="24" fill="#ffffff"/>
    <text x="146" y="696" class="screenTitle">For CSC workers</text>
    <text x="146" y="718" class="body">Assisted kiosk flow with printable result sheets.</text>

    <rect x="122" y="740" width="280" height="22" rx="11" fill="#eef2f7"/>
    <text x="155" y="755" class="nav">Home</text>
    <text x="220" y="755" class="nav">Saved</text>
    <text x="292" y="755" class="nav">Calendar</text>
    <text x="369" y="755" class="nav">Profile</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="530" y="180" width="340" height="610" rx="38" fill="#0f172a"/>
    <rect x="544" y="194" width="312" height="582" rx="28" fill="#f8fafc"/>
    <rect x="644" y="204" width="112" height="20" rx="10" fill="#d1d5db"/>

    <rect x="564" y="242" width="272" height="132" rx="28" fill="#e5faf2"/>
    <text x="586" y="278" class="body" fill="#0f766e">MATCHED SCHEMES</text>
    <text x="586" y="318" font-family="Segoe UI, Inter, Arial" font-size="30" font-weight="700" fill="#0f172a">You qualify for</text>
    <text x="586" y="352" font-family="Segoe UI, Inter, Arial" font-size="30" font-weight="700" fill="#0f172a">12 schemes</text>

    <rect x="564" y="394" width="272" height="110" rx="24" fill="#ffffff"/>
    <text x="584" y="426" class="screenTitle">PM Kisan Support</text>
    <text x="584" y="448" class="body">Eligible now • Direct benefit transfer • State + occupation match</text>
    <rect x="584" y="466" width="112" height="22" rx="11" fill="#dcfce7"/>
    <text x="609" y="481" class="body" fill="#166534">Matched</text>

    <rect x="564" y="522" width="272" height="110" rx="24" fill="#ffffff"/>
    <text x="584" y="554" class="screenTitle">Scholarship Support</text>
    <text x="584" y="576" class="body">Near miss • Income slightly above threshold • Review gap details</text>
    <rect x="584" y="594" width="112" height="22" rx="11" fill="#fef3c7"/>
    <text x="607" y="609" class="body" fill="#92400e">Near miss</text>

    <rect x="564" y="650" width="272" height="90" rx="24" fill="#ffffff"/>
    <text x="584" y="682" class="screenTitle">Deadline calendar</text>
    <text x="584" y="704" class="body">Urgent application windows and tracked reminders.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="968" y="180" width="340" height="610" rx="38" fill="#0f172a"/>
    <rect x="982" y="194" width="312" height="582" rx="28" fill="#f8fafc"/>
    <rect x="1082" y="204" width="112" height="20" rx="10" fill="#d1d5db"/>

    <rect x="1002" y="242" width="272" height="110" rx="28" fill="#ffffff"/>
    <circle cx="1060" cy="297" r="34" fill="#d1fae5"/>
    <text x="1112" y="286" class="screenTitle">Ansh Kumar</text>
    <text x="1112" y="310" class="body">Farmer • Uttar Pradesh • OBC</text>
    <text x="1112" y="332" class="body">Photo-ready profile summary</text>

    <rect x="1002" y="372" width="272" height="136" rx="24" fill="#ffffff"/>
    <text x="1022" y="406" class="screenTitle">Account information</text>
    <rect x="1022" y="424" width="232" height="16" rx="8" fill="#edf2f7"/>
    <rect x="1022" y="452" width="232" height="16" rx="8" fill="#edf2f7"/>
    <rect x="1022" y="480" width="180" height="16" rx="8" fill="#edf2f7"/>

    <rect x="1002" y="530" width="272" height="112" rx="24" fill="#ffffff"/>
    <text x="1022" y="564" class="screenTitle">Family profiles</text>
    <rect x="1022" y="582" width="112" height="34" rx="17" fill="#dcfce7"/>
    <rect x="1142" y="582" width="112" height="34" rx="17" fill="#eff6ff"/>
    <text x="1050" y="603" class="body" fill="#166534">Primary</text>
    <text x="1173" y="603" class="body" fill="#1d4ed8">Member</text>

    <rect x="1002" y="662" width="272" height="78" rx="24" fill="#ecfdf5"/>
    <text x="1022" y="694" class="screenTitle">Bilingual UX</text>
    <text x="1022" y="718" class="body">Hindi + English labels designed for accessible onboarding.</text>
  </g>
</svg>
