<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">YojnaPath System Architecture</title>
  <desc id="desc">Architecture diagram for YojnaPath showing users, the React and Vite progressive web app, the Express API layer, and backing PostgreSQL, MongoDB, and Redis services.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fcf8" />
      <stop offset="100%" stop-color="#dcf6ea" />
    </linearGradient>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#145c49" />
      <stop offset="100%" stop-color="#0f8f69" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4fbf7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#11825f" />
    </marker>
    <style>
      .title { font: 700 44px 'Segoe UI', Inter, Arial, sans-serif; fill: #10221c; }
      .subtitle { font: 500 20px 'Segoe UI', Inter, Arial, sans-serif; fill: #3f6258; }
      .boxText { font: 700 24px 'Segoe UI', Inter, Arial, sans-serif; fill: #10221c; }
      .boxSub { font: 500 15px 'Segoe UI', Inter, Arial, sans-serif; fill: #58756b; }
      .darkText { font: 700 26px 'Segoe UI', Inter, Arial, sans-serif; fill: #ffffff; }
      .darkSub { font: 500 15px 'Segoe UI', Inter, Arial, sans-serif; fill: #d8efe7; }
      .miniHead { font: 700 18px 'Segoe UI', Inter, Arial, sans-serif; fill: #10221c; }
      .miniBody { font: 500 14px 'Segoe UI', Inter, Arial, sans-serif; fill: #5b786e; }
      .pill { font: 700 14px 'Segoe UI', Inter, Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1400" height="860" rx="32" fill="url(#bg)" />

  <text x="72" y="88" class="title">YojnaPath Core Architecture</text>
  <text x="72" y="122" class="subtitle">Current application design for bilingual scheme discovery, profile management, and admin operations</text>

  <g>
    <rect x="72" y="92" width="132" height="34" rx="17" fill="#0f8f69" />
    <text x="138" y="114" text-anchor="middle" class="pill">Current system</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="162" width="1232" height="638" rx="32" fill="rgba(255,255,255,0.6)" />
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="220" width="260" height="126" rx="30" fill="url(#card)" />
    <text x="240" y="275" text-anchor="middle" class="boxText">Users / CSC Operators</text>
    <text x="240" y="304" text-anchor="middle" class="boxSub">Citizens, family workflows, assisted kiosk usage</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="206" width="480" height="156" rx="34" fill="url(#hero)" />
    <text x="700" y="268" text-anchor="middle" class="darkText">React + Vite PWA</text>
    <text x="700" y="300" text-anchor="middle" class="darkSub">Mobile-first bilingual frontend with login, matching, tracker, calendar, and admin UI</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="495" y="412" width="410" height="138" rx="34" fill="#123a30" />
    <text x="700" y="468" text-anchor="middle" class="darkText">Express API Layer</text>
    <text x="700" y="496" text-anchor="middle" class="darkSub">Authentication, profiles, scheme matching, saved items, uploads, kiosk, analytics, admin routes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="130" y="638" width="320" height="118" rx="30" fill="url(#card)" />
    <text x="290" y="690" text-anchor="middle" class="boxText">PostgreSQL</text>
    <text x="290" y="718" text-anchor="middle" class="boxSub">Users, profiles, applications, match logs, analytics, admin data</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="638" width="320" height="118" rx="30" fill="url(#card)" />
    <text x="700" y="690" text-anchor="middle" class="boxText">MongoDB</text>
    <text x="700" y="718" text-anchor="middle" class="boxSub">Scheme master documents, eligibility metadata, ingestion output</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="638" width="320" height="118" rx="30" fill="url(#card)" />
    <text x="1110" y="690" text-anchor="middle" class="boxText">Redis</text>
    <text x="1110" y="718" text-anchor="middle" class="boxSub">OTP storage, cache, scheduler helpers, degraded-mode fallbacks</text>
  </g>

  <path d="M370 283 L460 283" fill="none" stroke="#11825f" stroke-width="6" marker-end="url(#arrow)" />
  <path d="M700 362 L700 412" fill="none" stroke="#11825f" stroke-width="6" marker-end="url(#arrow)" />
  <path d="M700 550 L700 594" fill="none" stroke="#11825f" stroke-width="6" marker-end="url(#arrow)" />
  <path d="M700 594 L290 594 L290 638" fill="none" stroke="#11825f" stroke-width="5" marker-end="url(#arrow)" />
  <path d="M700 594 L700 638" fill="none" stroke="#11825f" stroke-width="5" marker-end="url(#arrow)" />
  <path d="M700 594 L1110 594 L1110 638" fill="none" stroke="#11825f" stroke-width="5" marker-end="url(#arrow)" />

  <g filter="url(#shadow)">
    <rect x="980" y="220" width="260" height="130" rx="28" fill="url(#card)" />
    <text x="1110" y="266" text-anchor="middle" class="miniHead">Frontend features</text>
    <text x="1110" y="292" text-anchor="middle" class="miniBody">OTP + Google sign-in</text>
    <text x="1110" y="314" text-anchor="middle" class="miniBody">Hindi + English UX</text>
    <text x="1110" y="336" text-anchor="middle" class="miniBody">Saved schemes, tracker, calendar</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="418" width="300" height="132" rx="28" fill="url(#card)" />
    <text x="260" y="464" text-anchor="middle" class="miniHead">Backend responsibilities</text>
    <text x="260" y="490" text-anchor="middle" class="miniBody">Route handling and validation</text>
    <text x="260" y="512" text-anchor="middle" class="miniBody">Schema bootstrap and startup services</text>
    <text x="260" y="534" text-anchor="middle" class="miniBody">Matching engine and admin analytics</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="990" y="428" width="250" height="108" rx="28" fill="url(#card)" />
    <text x="1115" y="470" text-anchor="middle" class="miniHead">Operational helpers</text>
    <text x="1115" y="496" text-anchor="middle" class="miniBody">Cloudinary uploads</text>
    <text x="1115" y="518" text-anchor="middle" class="miniBody">Email OTP and schedulers</text>
  </g>
</svg>
